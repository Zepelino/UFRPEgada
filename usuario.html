<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Usuário | UFRPEgada</title>
    <link rel="icon" href="src/assets/imagens/UFRPEgada_LOGO.png" type="image/png">
    <link rel="stylesheet" href="src/css/global.css" />
    <link rel="stylesheet" href="src/css/usuario.css" />
  </head>

  <body>
    <header class="topbar">
      <h1>UFRPEgada</h1>

      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="atividades.html">Atividades</a>
        <button id="logout-btn">Sair</button>
      </nav>
    </header>

    <main class="profile-container">
      <section class="profile-card">
        <div class="profile-header">
          <div class="avatar">J</div>

          <div>
            <h2 id="user-name">Júlio</h2>
            <p id="user-email">julio@email.com</p>
          </div>
        </div>

        <div class="profile-info">
          <div class="info-card">
            <h3>Pontuação Verde</h3>
            <p id="user-score">120 pts</p>
          </div>

          <div class="info-card">
            <h3>Atividades Registradas</h3>
            <p id="user-activities">14</p>
          </div>

          <div class="info-card">
            <h3>Nível Sustentável</h3>
            <p id="user-level">Eco Iniciante</p>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="src/js/pages/usuario.js"></script>
  </body>
</html>
