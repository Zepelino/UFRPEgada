<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | UFRPEGADA</title>
    <link rel="icon" href="src/assets/imagens/UFRPEgada_LOGO.png" type="image/png">
    <link rel="stylesheet" href="src/css/global.css" />
    <link rel="stylesheet" href="src/css/dashboard.css" />
    
    <!-- Importação do Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="topbar">
        <h1>UFRPEgada</h1>

        <nav>
            <a href="usuario.html">Meu Perfil</a>
            <button id="logout-btn">Sair</button>
        </nav>
    </header>

    <main class="dashboard-container">

        <!-- ===== CARDS DO TOPO (Foco Analítico) ===== -->
        <section class="stats-grid">

            <div class="stat-card">
                <h3>Pegada Atual</h3>
                <p class="stat-value" id="valor-emissao-total">
                    0.00 kg CO₂
                </p>
            </div>

            <div class="stat-card">
                <h3>Média Diária</h3>
                <p class="stat-value" id="media-diaria">
                    0.00 kg/dia
                </p>
            </div>

            <div class="stat-card">
                <h3>Ofensiva Atual</h3>
                <p class="stat-value" id="ofensiva-atual">
                    0 dias 🔥
                </p>
            </div>

            <div class="stat-card">
                <h3>Total de Atividades</h3>
                <p class="stat-value" id="total-atividades-contador">
                    0
                </p>
            </div>

        </section>

        <!-- ===== LOG DIÁRIO ===== -->
        <section class="recent-activities">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin: 0;">Log Diário</h2>
                
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label for="filtro-data-diario" style="font-size: 0.9em; color: #555; font-weight: 500;">Filtrar dia:</label>
                    <input type="date" id="filtro-data-diario" style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; color: #333; outline: none; cursor: pointer;">
                </div>
            </div>

            <div id="dashboard-lista-atividades">
                <p style="color: #666; padding: 10px;">Carregando atividades...</p>
            </div>

        </section>
        
        <!-- ===== GRÁFICOS ===== -->
        <section class="chart-card chart-card-emission">
            <div class="chart-header">
                <h2>Emissões de CO₂</h2>
                <div class="period-selector">
                    <button class="period-btn active" data-period="semanal">Semanal</button>
                    <button class="period-btn" data-period="mensal">Mensal</button>
                    <button class="period-btn" data-period="anual">Anual</button>
                </div>
            </div>
            <canvas id="emissionChart"></canvas>
        </section>
        
        <section class="chart-card chart-card-impact">
            <div class="chart-header">
                <h2>Atividades Mais Impactantes</h2>
                <div class="period-selector">
                    <button class="impact-btn active" data-impact-period="semanal">Semanal</button>
                    <button class="impact-btn" data-impact-period="mensal">Mensal</button>
                    <button class="impact-btn" data-impact-period="anual">Anual</button>
                </div>
            </div>
            <div class="chart-impact-container">
                <canvas id="impactChart"></canvas>
            </div>
        </section>

    </main>

    <!-- Script carregado corretamente como módulo e apenas uma vez -->
    <script type="module" src="src/js/pages/dashboard.js?v=2"></script>
</body>
</html>
