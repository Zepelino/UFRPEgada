<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UFRPEGADA</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <header>
        <img src="./assets/imagens/UFRPegada_LOGO.png" alt="Logo UFRPEGADA" width="120">
        <nav>
            <a href="usuario.html">Meu Perfil</a>
            <a href="index.html">Sair</a>
        </nav>
    </header>

    <main class="container">
        <!-- EXIBIÇÃO DO CÁLCULO (REQ4) -->
        <section class="card-emissao">
            <h2>Sua Pegada de Carbono Atual</h2>
            <div class="display-valor">
                <span id="valor-emissao-total">0.00 kg CO2</span>
            </div>
        </section>

        <!-- FORMULÁRIO DE REGISTRO (REQ4) -->
        <section class="card-registro">
            <h3>Registrar Atividade Diária</h3>
            <form id="meu-formulario-atividades">
                <div class="input-group">
                    <label for="select-atividade">O que você fez?</label>
                    <select id="select-atividade" required>
                        <option value="" disabled selected>Selecione uma atividade</option>
                        <!-- UUIDs extraídos do seu banco de dados -->
                        <option value="2cd9074c-bf8d-488a-a2d0-939657522612">Ar-condicionado</option>
                        <option value="50a8b863-05ce-4a7f-be7f-a47c61cfe3fd">Uso de Desktop</option>
                        <option value="bf36caa8-267f-483f-a477-375e4f1f2f61">Banho Quente</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="input-tempo">Por quanto tempo? (em horas)</label>
                    <input type="number" id="input-tempo" step="0.1" min="0.1" placeholder="Ex: 1.5" required>
                </div>

                <button type="submit" class="btn-registrar">Registrar no Banco</button>
            </form>
        </section>
    </main>

    <!-- SCRIPTS NA ORDEM DE DEPENDÊNCIA -->
    <!-- 1. SDK do Supabase para o window.supabase funcionar -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. Seu arquivo de inicialização do cliente -->
    <script type="module" src="./js/services/supabaseClient.js"></script>
    
    <!-- 3. A lógica da página dashboard -->
    <script type="module" src="./js/pages/dashboard.js"></script>
</body>
</html>
