<!-- dashboard.html -->

<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | UFRPEGADA</title>
    <link rel="icon" href="src/assets/imagens/UFRPEgada_LOGO.png" type="image/png">
    <link rel="stylesheet" href="src/css/global.css" />
    <link rel="stylesheet" href="src/css/dashboard.css" />
</head>

<body>
    <header class="topbar">
        <h1>UFRPEgada</h1>

        <nav>
            <a href="usuario.html">Meu Perfil</a>
            <button id="logout-btn">Sair</button>
        </nav>
    </header>

 <main class="dashboard-container">

    <section class="stats-grid">

        <div class="stat-card">
            <h3>Pegada Atual</h3>

            <p class="stat-value" id="valor-emissao-total">
                0.00 kg CO₂
            </p>
        </div>

        <div class="stat-card">
            <h3>Pontuação Verde</h3>

            <p class="stat-value">
                120 pts
            </p>
        </div>

        <div class="stat-card">
            <h3>Nível Sustentável</h3>

            <p class="stat-value">
                Eco Iniciante
            </p>
        </div>

        <div class="stat-card">
            <h3>Atividades</h3>

            <p class="stat-value">
                14
            </p>
        </div>

    </section>

    <section class="recent-activities">

        <h2>Últimas Atividades</h2>

        <div class="activity-item">
            <span>🚿 Banho Quente</span>
            <span>1h</span>
        </div>

        <div class="activity-item">
            <span>🖥️ Uso de Desktop</span>
            <span>3h</span>
        </div>

        <div class="activity-item">
            <span>❄️ Ar-condicionado</span>
            <span>2h</span>
        </div>

    </section>

</main>

</body>
