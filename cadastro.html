<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | UFRPEgada</title>
  <link rel="icon" href="src/assets/imagens/UFRPEgada_LOGO.png" type="image/png">
  <link rel="stylesheet" href="src/css/global.css" />
  <link rel="stylesheet" href="src/css/login.css" />
</head>

<body>
  <!-- Container das folhas -->
  <div id="leaves-container"></div>
  
  <div class="login-container">
    <div class="login-card">
      <h1>UFRPEgada</h1>
      <p class="subtitle">Crie sua conta</p>

      <form id="register-form">
        <div class="input-group">
          <label>Nome</label>
          <input type="text" id="nome" required />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit" class="btn-primary">Cadastrar</button>

        <!-- Link para login ADICIONADO AQUI -->
        <p class="switch-auth">
          Já possui cadastro? <a href="login.html">Faça login</a>
        </p>

        <p id="error-message" class="error-message"></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="src/js/pages/cadastro.js"></script>
</body>
</html>
